services:
  postgres:
    image: postgres:15-alpine
    container_name: bookgate_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookgate}
      POSTGRES_USER: ${POSTGRES_USER:-bookgate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookgate_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookgate} -d ${POSTGRES_DB:-bookgate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookgate_net

  minio:
    image: quay.io/minio/minio:latest
    container_name: bookgate_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookgate_net

  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: bookgate_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookgate}:${POSTGRES_PASSWORD:-bookgate_secret}@postgres:5432/${POSTGRES_DB:-bookgate}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production_32chars}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-bookgate}
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_SECURE: "false"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bookgate.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Admin}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    volumes:
      - ./api-service:/app
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bookgate_net
    restart: unless-stopped

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: bookgate_chat
    environment:
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production_32chars}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_SERVICE_URL: http://api-service:8000
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    volumes:
      - ./chat-service:/app
    expose:
      - "8001"
    depends_on:
      - api-service
    networks:
      - bookgate_net
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: bookgate_gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - api-service
      - chat-service
    networks:
      - bookgate_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookgate_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    networks:
      - bookgate_net
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  bookgate_net:
    driver: bridge
