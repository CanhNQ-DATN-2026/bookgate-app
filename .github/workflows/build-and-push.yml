name: Build And Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bookgate-build-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  HELM_REPO: CanhNQ-DATN-2026/helm-repo

jobs:
  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-service
            context: api-service
            image_repo: bookgate/api-service
          - name: chat-service
            context: chat-service
            image_repo: bookgate/chat-service
          - name: frontend
            context: frontend
            image_repo: bookgate/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ECR Registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail

          : "${AWS_REGION:?AWS_REGION repository variable is required}"
          : "${ECR_REGISTRY:?ECR_REGISTRY repository variable is required}"

          ecr_registry="$(printf '%s' "$ECR_REGISTRY" | tr -d '\r' | xargs)"
          echo "value=$ecr_registry" >> "$GITHUB_OUTPUT"

          case "$ecr_registry" in
            */*)
              echo "ECR_REGISTRY must be the registry host only, for example 123456789012.dkr.ecr.us-east-1.amazonaws.com"
              exit 1
              ;;
            *.dkr.ecr."$AWS_REGION".amazonaws.com) ;;
            *)
              echo "ECR_REGISTRY ($ecr_registry) does not match AWS_REGION ($AWS_REGION)"
              exit 1
              ;;
          esac

      - name: Set Image Tag
        id: image
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-bookgate-build

      - name: Login To Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.registry.outputs.value }}/${{ matrix.image_repo }}:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-repo:
    name: Update Helm Repo Image Tags
    runs-on: ubuntu-latest
    needs:
      - build-and-push

    steps:
      - name: Checkout Helm Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          ref: main
          token: ${{ secrets.HELM_REPO_PUSH_TOKEN }}
          path: helm-repo

      - name: Set Image Tag
        id: image
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update Helm Values
        shell: bash
        run: |
          set -euo pipefail

          values_file="helm-repo/bookgate/values.yaml"
          image_tag="${{ steps.image.outputs.tag }}"

          perl -0pi -e 's/(apiService:\n(?:.*\n)*?\s+tag:\s+\")([^\"]+)(\")/${1}'"$image_tag"'${3}/' "$values_file"
          perl -0pi -e 's/(chatService:\n(?:.*\n)*?\s+tag:\s+\")([^\"]+)(\")/${1}'"$image_tag"'${3}/' "$values_file"
          perl -0pi -e 's/(frontend:\n(?:.*\n)*?\s+tag:\s+\")([^\"]+)(\")/${1}'"$image_tag"'${3}/' "$values_file"

      - name: Commit And Push Helm Repo
        shell: bash
        run: |
          set -euo pipefail

          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- bookgate/values.yaml; then
            echo "Helm values already point to ${GITHUB_SHA::7}; nothing to commit."
            exit 0
          fi

          git add bookgate/values.yaml
          git commit -m "chore: bump app image tags to ${GITHUB_SHA::7}"
          git push origin main
