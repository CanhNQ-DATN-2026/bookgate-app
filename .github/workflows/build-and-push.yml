name: Build And Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bookgate-build-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  HELM_REPO: CanhNQ-DATN-2026/helm-repo

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      api_changed: ${{ steps.filter.outputs.api_service }}
      chat_changed: ${{ steps.filter.outputs.chat_service }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api_service:
              - 'api-service/**'
            chat_service:
              - 'chat-service/**'
            frontend:
              - 'frontend/**'

      - name: Build Matrix
        id: matrix
        shell: bash
        env:
          API_CHANGED: ${{ steps.filter.outputs.api_service }}
          CHAT_CHANGED: ${{ steps.filter.outputs.chat_service }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          matrix='{"include":[]}'

          add_service() {
            local name="$1"
            local context="$2"
            local image_repo="$3"
            matrix="$(jq \
              --arg name "$name" \
              --arg context "$context" \
              --arg image_repo "$image_repo" \
              '.include += [{"name": $name, "context": $context, "image_repo": $image_repo}]' \
              <<<"$matrix")"
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$API_CHANGED" = "true" ]; then
            add_service "api-service" "api-service" "bookgate/api-service"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$CHAT_CHANGED" = "true" ]; then
            add_service "chat-service" "chat-service" "bookgate/chat-service"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$FRONTEND_CHANGED" = "true" ]; then
            add_service "frontend" "frontend" "bookgate/frontend"
          fi

          echo "matrix=$(jq -c . <<<"$matrix")" >> "$GITHUB_OUTPUT"

          if [ "$(jq '.include | length' <<<"$matrix")" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ECR Registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail

          : "${AWS_REGION:?AWS_REGION repository variable is required}"
          : "${ECR_REGISTRY:?ECR_REGISTRY repository variable is required}"

          ecr_registry="$(printf '%s' "$ECR_REGISTRY" | tr -d '\r' | xargs)"
          echo "value=$ecr_registry" >> "$GITHUB_OUTPUT"

          case "$ecr_registry" in
            */*)
              echo "ECR_REGISTRY must be the registry host only, for example 123456789012.dkr.ecr.us-east-1.amazonaws.com"
              exit 1
              ;;
            *.dkr.ecr."$AWS_REGION".amazonaws.com) ;;
            *)
              echo "ECR_REGISTRY ($ecr_registry) does not match AWS_REGION ($AWS_REGION)"
              exit 1
              ;;
          esac

      - name: Set Image Tag
        id: image
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-bookgate-build

      - name: Login To Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.registry.outputs.value }}/${{ matrix.image_repo }}:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-repo:
    name: Update Helm Repo Image Tags
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-and-push
    if: needs.detect-changes.outputs.has_changes == 'true'

    steps:
      - name: Checkout Helm Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          ref: main
          token: ${{ secrets.HELM_REPO_PUSH_TOKEN }}
          path: helm-repo

      - name: Set Image Tag
        id: image
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update Helm Values
        shell: bash
        env:
          API_CHANGED: ${{ needs.detect-changes.outputs.api_changed }}
          CHAT_CHANGED: ${{ needs.detect-changes.outputs.chat_changed }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend_changed }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          values_file="helm-repo/bookgate/values.yaml"
          image_tag="${{ steps.image.outputs.tag }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$API_CHANGED" = "true" ]; then
            perl -0pi -e 's/(apiService:\n(?:.*\n)*?\s+tag:\s+\")([^\"]+)(\")/${1}'"$image_tag"'${3}/' "$values_file"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$CHAT_CHANGED" = "true" ]; then
            perl -0pi -e 's/(chatService:\n(?:.*\n)*?\s+tag:\s+\")([^\"]+)(\")/${1}'"$image_tag"'${3}/' "$values_file"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$FRONTEND_CHANGED" = "true" ]; then
            perl -0pi -e 's/(frontend:\n(?:.*\n)*?\s+tag:\s+\")([^\"]+)(\")/${1}'"$image_tag"'${3}/' "$values_file"
          fi

      - name: Commit And Push Helm Repo
        shell: bash
        run: |
          set -euo pipefail

          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- bookgate/values.yaml; then
            echo "Helm values already point to the requested image tags; nothing to commit."
            exit 0
          fi

          git add bookgate/values.yaml
          git commit -m "chore: bump app image tags to ${GITHUB_SHA::7}"
          git push origin main
