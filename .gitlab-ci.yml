stages:
  - build

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"

# ── ECR auth + Docker-in-Docker ───────────────────────────────────────────────
# Requires: runner with privileged = true
# CI variables:
#   AWS_ROLE_ARN  — IAM role assumable via GitLab OIDC
#   AWS_REGION    — AWS region, must match Terraform deployment region
#   ECR_REGISTRY  — Terraform output ecr_registry_url (registry host only)
.ecr_build: &ecr_build
  image: docker:26
  services:
    - docker:26-dind
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - |
      set -eu
      apk add --no-cache curl unzip > /dev/null
      curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
      unzip -q /tmp/awscliv2.zip -d /tmp
      /tmp/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update > /dev/null

      : "${AWS_ROLE_ARN:?AWS_ROLE_ARN is required}"
      : "${AWS_REGION:?AWS_REGION is required}"
      : "${ECR_REGISTRY:?ECR_REGISTRY is required}"
      : "${GITLAB_OIDC_TOKEN:?GITLAB_OIDC_TOKEN is required}"

      case "$ECR_REGISTRY" in
        */*)
          echo "ECR_REGISTRY must be the registry host only, for example 123456789012.dkr.ecr.us-east-1.amazonaws.com"
          exit 1
          ;;
        *.dkr.ecr."$AWS_REGION".amazonaws.com) ;;
        *)
          echo "ECR_REGISTRY ($ECR_REGISTRY) does not match AWS_REGION ($AWS_REGION)"
          exit 1
          ;;
      esac

      export AWS_DEFAULT_REGION="$AWS_REGION"
      export AWS_STS_REGIONAL_ENDPOINTS=regional
      export AWS_WEB_IDENTITY_TOKEN_FILE="${CI_PROJECT_DIR}/.gitlab_oidc_token"
      printf '%s' "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"

      aws sts get-caller-identity > /dev/null
      docker version > /dev/null
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

# ── Build jobs (run in parallel) ─────────────────────────────────────────────
build-api:
  stage: build
  <<: *ecr_build
  script:
    - docker build -t "$ECR_REGISTRY/bookgate/api-service:$IMAGE_TAG" api-service/
    - docker push      "$ECR_REGISTRY/bookgate/api-service:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-chat:
  stage: build
  <<: *ecr_build
  script:
    - docker build -t "$ECR_REGISTRY/bookgate/chat-service:$IMAGE_TAG" chat-service/
    - docker push      "$ECR_REGISTRY/bookgate/chat-service:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-frontend:
  stage: build
  <<: *ecr_build
  script:
    - docker build -t "$ECR_REGISTRY/bookgate/frontend:$IMAGE_TAG" frontend/
    - docker push      "$ECR_REGISTRY/bookgate/frontend:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
