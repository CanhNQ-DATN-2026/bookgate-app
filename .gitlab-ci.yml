stages:
  - build

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"

# ── ECR auth + Docker-in-Docker ───────────────────────────────────────────────
# Requires: runner with privileged = true
# CI variables: AWS_ROLE_ARN, AWS_REGION, ECR_REGISTRY
.ecr_build: &ecr_build
  image: docker:26
  services:
    - docker:26-dind
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apk add --no-cache aws-cli jq > /dev/null
    - |
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn          "$AWS_ROLE_ARN" \
        --role-session-name "gitlab-build-${CI_PIPELINE_ID}" \
        --web-identity-token "$GITLAB_OIDC_TOKEN" \
        --region            "$AWS_REGION" \
        --duration-seconds  3600 \
        --query Credentials --output json)
      export AWS_ACCESS_KEY_ID=$(echo "$CREDS"     | jq -r .AccessKeyId)
      export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .SecretAccessKey)
      export AWS_SESSION_TOKEN=$(echo "$CREDS"     | jq -r .SessionToken)
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

# ── Build jobs (run in parallel) ─────────────────────────────────────────────
build-api:
  stage: build
  <<: *ecr_build
  script:
    - docker build -t "$ECR_REGISTRY/bookgate/api-service:$IMAGE_TAG" api-service/
    - docker push      "$ECR_REGISTRY/bookgate/api-service:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-chat:
  stage: build
  <<: *ecr_build
  script:
    - docker build -t "$ECR_REGISTRY/bookgate/chat-service:$IMAGE_TAG" chat-service/
    - docker push      "$ECR_REGISTRY/bookgate/chat-service:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-frontend:
  stage: build
  <<: *ecr_build
  script:
    - docker build -t "$ECR_REGISTRY/bookgate/frontend:$IMAGE_TAG" frontend/
    - docker push      "$ECR_REGISTRY/bookgate/frontend:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
